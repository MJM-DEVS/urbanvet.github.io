<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>UrbanVet</title>
  <script>
    // GitHub Pages has no server-side routing. The whole app is served from "/",
    // so for any deep link we hand the requested path to the SPA via the ?route=
    // param it knows how to restore, then clean the URL back to a pretty path.
    (function () {
      var l = window.location;
      var target = '/?route=' + encodeURIComponent(l.pathname)
        + (l.search ? '&' + l.search.slice(1) : '')
        + l.hash;
      l.replace(target);
    })();
  </script>
</head>
<body>
  <p>UrbanVet wird geladen… <a href="/">Zur Startseite</a></p>
</body>
</html>
